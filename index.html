/* ─── Scroll Reveal ─── */
function useInView(t = 0.12) {
  const ref = useRef(null);
  const [v, setV] = useState(false);
  const instant = useRef(false);
  useLayoutEffect(() => {
    const el = ref.current;
    if (!el) return;
    const rect = el.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      instant.current = true;
      setV(true);
    }
  }, []);
  useEffect(() => {
    if (v) return;
    const el = ref.current; if (!el) return;
    const o = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setV(true); o.disconnect(); } }, { threshold: t });
    o.observe(el); return () => o.disconnect();
  }, [t, v]);
  return [ref, v, instant.current];
}
function R({ children, delay = 0, style = {} }) {
  const [ref, v, instant] = useInView();
  return <div ref={ref} style={{ opacity: v ? 1 : 0, transform: v ? "translateY(0)" : "translateY(36px)", transition: instant ? "none" : `opacity 0.6s ease ${delay}s, transform 0.6s ease ${delay}s`, ...style }}>{children}</div>;
}

/* ─── Section Heading ─── */
function SH({ tag, title, sub, light }) {
  return (
    <div style={{ textAlign: "center", marginBottom: sub ? 48 : 56 }}>
      {tag && <div style={{ fontSize: 11, letterSpacing: 6, color: C.cyan, fontWeight: 700, marginBottom: 10, textTransform: "uppercase", fontFamily: font }}>{tag}</div>}

/* ─── Page Hero Banner ─── */
function PageHero({ title, sub, tag }) {
  return (
    <section style={{ position: "relative", padding: "160px 24px 80px", textAlign: "center", background: `linear-gradient(175deg, ${C.deep} 0%, ${C.navy} 50%, ${C.steel} 100%)`, overflow: "hidden" }}>

      <div style={{ position: "relative", zIndex: 1, maxWidth: 700, margin: "0 auto" }}>
        {tag && <div style={{ fontSize: 11, letterSpacing: 6, color: C.cyan, fontWeight: 700, marginBottom: 14, textTransform: "uppercase" }}>{tag}</div>}

        <div style={{ width: 70, height: 4, background: `linear-gradient(90deg, ${C.gold}, ${C.cyan})`, borderRadius: 2, margin: "0 auto 20px" }} />
        {sub && <p style={{ fontSize: 16, color: C.greyL, lineHeight: 1.7 }}>{sub}</p>}

}

/* ─── Modal ─── */
function Modal({ open, onClose, title, children }) {
  if (!open) return null;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
      <div style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(8px)" }} />
      <div onClick={e => e.stopPropagation()} className="modal-inner" style={{ position: "relative", background: `linear-gradient(160deg, ${C.deep}, ${C.steel})`, borderRadius: 16, padding: "36px 32px", maxWidth: 520, width: "100%", border: `1px solid ${C.gold}33`, boxShadow: "0 24px 80px rgba(0,0,0,0.6)", maxHeight: "85vh", overflowY: "auto" }}>
        <button onClick={onClose} style={{ position: "absolute", top: 14, right: 18, background: "none", border: "none", color: C.grey, fontSize: 22, cursor: "pointer" }}>✕</button>
        <h2 style={{ fontFamily: serif, fontSize: 26, color: C.gold, margin: "0 0 6px" }}>{title}</h2>
        <div style={{ width: 50, height: 3, background: C.cyan, borderRadius: 2, marginBottom: 24 }} />
        {children}
      </div>
    </div>
  );
}

/* ─── Feature Card ─── */
function FeatureCard({ icon, title, desc, color, onClick }) {
  const [h, setH] = useState(false);
  return (
    <div onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)} onClick={onClick}
      style={{ background: C.card, borderRadius: 14, padding: "32px 28px", border: `1px solid ${h ? (color || C.gold) + "55" : C.steel}`, transition: "all 0.4s", cursor: onClick ? "pointer" : "default", transform: h ? "translateY(-4px)" : "none", position: "relative", overflow: "hidden" }}>
      {color && <div style={{ position: "absolute", top: 0, right: 0, width: 80, height: 80, background: `radial-gradient(circle at top right, ${color}18, transparent)` }} />}
